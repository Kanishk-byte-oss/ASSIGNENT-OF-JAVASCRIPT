<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emoji Reactor</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 320px;
        }

        .title {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .emoji-container {
            display: flex;
            justify-content: space-between;
        }

        .emoji-btn {
            font-size: 28px;
            padding: 10px;
            border: none;
            background: #f3f3f3;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .emoji-btn:hover {
            transform: scale(1.2);
            background: #e0e0e0;
        }

        #result {
            font-size: 60px;
            margin-top: 25px;
            transition: transform 0.3s ease;
        }

        .animate {
            transform: scale(1.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="title">How are you feeling?</h1>

        <div class="emoji-container">
            <button class="emoji-btn">😀</button>
            <button class="emoji-btn">😢</button>
            <button class="emoji-btn">😡</button>
            <button class="emoji-btn">😍</button>
        </div>

        <p id="result">🙂</p>
    </div>

    <script>
        const buttons = document.querySelectorAll('.emoji-btn');
        const result = document.querySelector('#result');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                result.textContent = btn.textContent;

                // Small animation effect
                result.classList.add('animate');
                setTimeout(() => {
                    result.classList.remove('animate');
                }, 200);
            });
        });
    </script>

</body>
</html>
